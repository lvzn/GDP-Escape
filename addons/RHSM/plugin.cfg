[plugin]

name="Reactionary Hierarchical State Machine"
description="An efficient Hierarchical State Machine, used for general purposes, with a built-in blackboard context node.

Allows performant and easy state machine creation via dynamic signals. Complexity is removed, but not at the cost of functionality. Only what is needed, at any one time, will run when a state is called."
author="Xavier Alvarez"
version="1.0.1"
script="RHSM.gd"
